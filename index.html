body {
  background-color: #050505;
  color: #e0e0e0;
  font-family: 'Orbitron', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

#conteiner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 0 24px;
}

/* MAP */
#map-wrap {
  position: relative;
  width: 180px;
  height: 90px;
  margin-bottom: 10px;
}

#map-wrap svg {
  width: 100%;
  height: 100%;
}

/* pin pulse */
.pin-pulse {
  animation: pulse 2s ease-out infinite;
  transform-origin: 50% 50%;
}
@keyframes pulse {
  0%   { opacity: 0.8; r: 4; }
  70%  { opacity: 0;   r: 12; }
  100% { opacity: 0;   r: 12; }
}

/* HORA */
#current-time {
  font-size: clamp(64px, 22vw, 108px);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
  text-align: center;
  color: #ffffff;
}

/* SEPARADOR */
.sep {
  width: 55%;
  height: 1px;
  background: linear-gradient(90deg, transparent, #2a2a2a, transparent);
  margin: 16px 0;
}

/* CALENDÁRIO */
#cal-month {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 200;
  letter-spacing: 0.45em;
  color: #555;
  margin-bottom: 14px;
  text-transform: uppercase;
  text-align: center;
}

#cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  width: 88%;
  margin: 0 auto 8px auto;
}

#cal-dow span {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 200;
  color: #333;
  text-align: center;
}

#cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  width: 88%;
  margin: 0 auto;
  row-gap: 6px;
}

.cal-day {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 300;
  color: #444;
  text-align: center;
  padding: 3px 0;
  line-height: 1;
}

.cal-day.today {
  background-color: #ffffff;
  color: #050505;
  font-weight: 700;
  border-radius: 50%;
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  padding: 0;
  font-size: 12px;
}

/* PREÇO */
#bitcoin-value {
  font-size: clamp(52px, 18vw, 88px);
  font-weight: 700;
  letter-spacing: -1px;
  line-height: 1;
  text-align: center;
  color: #ffffff;
}

/* DELTA */
#delta {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 200;
  letter-spacing: 0.25em;
  margin-top: 10px;
  text-align: center;
}

#delta.up   { color: #5a9a6a; }
#delta.down { color: #9a3a3a; }

<script>
  function updateTime() {
    const now = new Date();
    const h = now.getHours().toString().padStart(2, '0');
    const m = now.getMinutes().toString().padStart(2, '0');
    document.getElementById('current-time').textContent = h + ':' + m;
  }
  setInterval(updateTime, 1000);
  updateTime();

const MONTHS = [‘JANUARY’,‘FEBRUARY’,‘MARCH’,‘APRIL’,‘MAY’,‘JUNE’,
‘JULY’,‘AUGUST’,‘SEPTEMBER’,‘OCTOBER’,‘NOVEMBER’,‘DECEMBER’];

function buildCalendar() {
const now = new Date();
const year = now.getFullYear();
const month = now.getMonth();
const todayNum = now.getDate();
document.getElementById(‘cal-month’).textContent = MONTHS[month] + ’ ’ + year;
const firstWeekday = new Date(year, month, 1).getDay();
const daysInMonth  = new Date(year, month + 1, 0).getDate();
const grid = document.getElementById(‘cal-grid’);
grid.innerHTML = ‘’;
for (var i = 0; i < firstWeekday; i++) {
const e = document.createElement(‘span’);
e.className = ‘cal-day’;
grid.appendChild(e);
}
for (var d = 1; d <= daysInMonth; d++) {
const cell = document.createElement(‘span’);
cell.className = ‘cal-day’ + (d === todayNum ? ’ today’ : ‘’);
cell.textContent = d;
grid.appendChild(cell);
}
}
buildCalendar();

function showPrice(value, change) {
document.getElementById(‘bitcoin-value’).textContent = value.toLocaleString(‘en-US’);
const isUp = change >= 0;
document.getElementById(‘delta’).textContent = (isUp ? ‘▲ +’ : ’▼ ’) + change.toFixed(2) + ‘%’;
document.getElementById(‘delta’).className = isUp ? ‘up’ : ‘down’;
}

function fetchBitcoinValue() {
fetch(‘https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT’)
.then(r => r.json())
.then(data => {
showPrice(Math.round(parseFloat(data.lastPrice)), parseFloat(data.priceChangePercent));
})
.catch(() => {
fetch(‘https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true’)
.then(r => r.json())
.then(data => { showPrice(Math.round(data.bitcoin.usd), data.bitcoin.usd_24h_change); })
.catch(() => { document.getElementById(‘bitcoin-value’).textContent = ‘Error’; });
});
}

fetchBitcoinValue();
setInterval(fetchBitcoinValue, 10000);
</script>
