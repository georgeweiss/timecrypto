html, body {
  height: 100%;
  background: #000 !important;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  overflow: hidden;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

#conteiner {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 88%;
  max-width: 420px;
}

/* HORA */
#current-time {
  font-size: clamp(64px, 20vw, 110px);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
  text-align: center;
  width: 100%;
  color: #fff;
  padding: 0 0 20px 0;
  border-bottom: 1px solid #1f1f1f;
}

/* CALENDÁRIO */
#calendar {
  width: 100%;
  padding: 20px 0;
  border-bottom: 1px solid #1f1f1f;
}

#cal-month {
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #888;
  margin-bottom: 14px;
  text-transform: uppercase;
  text-align: center;
}

#cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  width: 100%;
  margin-bottom: 8px;
}

#cal-dow span {
  font-size: 10px;
  color: #444;
  text-align: center;
}

#cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  width: 100%;
  row-gap: 8px;
}

.cal-day {
  font-size: 14px;
  color: #666;
  text-align: center;
  padding: 3px 0;
  line-height: 1;
}

.cal-day.today {
  background: #fff;
  color: #000;
  font-weight: 700;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  padding: 0;
  font-size: 14px;
}

/* PREÇO */
#bitcoin-value {
  font-size: clamp(64px, 20vw, 110px);
  font-weight: 700;
  letter-spacing: -2px;
  line-height: 1;
  text-align: center;
  width: 100%;
  color: #fff;
  padding-top: 20px;
}

#delta {
  font-size: 16px;
  font-weight: 400;
  letter-spacing: 0.08em;
  margin-top: 10px;
  text-align: center;
  width: 100%;
}

#delta.up   { color: #4caf7d; }
#delta.down { color: #c0392b; }

  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('current-time').textContent = h + ':' + m;
    }
    setInterval(updateTime, 1000);
    updateTime();

    const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                    'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

    function buildCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const todayNum = now.getDate();
      document.getElementById('cal-month').textContent = MONTHS[month] + ' ' + year;
      const firstWeekday = new Date(year, month, 1).getDay();
      const daysInMonth  = new Date(year, month + 1, 0).getDate();
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      for (var i = 0; i < firstWeekday; i++) {
        const e = document.createElement('span');
        e.className = 'cal-day';
        grid.appendChild(e);
      }
      for (var d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('span');
        cell.className = 'cal-day' + (d === todayNum ? ' today' : '');
        cell.textContent = d;
        grid.appendChild(cell);
      }
    }
    buildCalendar();

    function showPrice(value, change) {
      document.getElementById('bitcoin-value').textContent = value.toLocaleString('en-US');
      const isUp = change >= 0;
      document.getElementById('delta').textContent = (isUp ? '▲ +' : '▼ ') + change.toFixed(2) + '%';
      document.getElementById('delta').className = isUp ? 'up' : 'down';
    }

    function tryFetch(attempt) {
      if (attempt === 1) {
        fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT')
          .then(r => r.json())
          .then(data => { showPrice(Math.round(parseFloat(data.lastPrice)), parseFloat(data.priceChangePercent)); })
          .catch(() => tryFetch(2));
      } else if (attempt === 2) {
        fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true')
          .then(r => r.json())
          .then(data => { showPrice(Math.round(data.bitcoin.usd), data.bitcoin.usd_24h_change); })
          .catch(() => tryFetch(3));
      } else {
        fetch('https://mempool.space/api/v1/prices')
          .then(r => r.json())
          .then(data => { document.getElementById('bitcoin-value').textContent = Math.round(data.USD).toLocaleString('en-US'); })
          .catch(() => { document.getElementById('bitcoin-value').textContent = '---'; });
      }
    }

    tryFetch(1);
    setInterval(function() { tryFetch(1); }, 10000);
  </script>
