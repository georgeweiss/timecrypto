  </style>
</head>
<body>
  <div id="conteiner">
    <div id="current-time"></div>
    <div id="bitcoin-value"></div>
    <div id="delta"></div>
    <div id="calendar">
      <div id="cal-month"></div>
      <div id="cal-dow">
        <span>SU</span><span>MO</span><span>TU</span>
        <span>WE</span><span>TH</span><span>FR</span><span>SA</span>
      </div>
      <div id="cal-grid"></div>
    </div>
  </div>

  <script>
    // ── BITCOIN ──
    const bitcoinValueElement = document.getElementById('bitcoin-value');
    const deltaElement = document.getElementById('delta');

    function showPrice(value, change) {
      bitcoinValueElement.textContent = value.toLocaleString('en-US');
      const isUp = change >= 0;
      deltaElement.textContent = (isUp ? '▲ +' : '▼ ') + change.toFixed(2) + '%  24H';
      deltaElement.className = isUp ? 'up' : 'down';
    }

    function fetchBinance() {
      return fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT')
        .then(r => r.json())
        .then(data => {
          showPrice(
            Math.round(parseFloat(data.lastPrice)),
            parseFloat(data.priceChangePercent)
          );
        });
    }

    function fetchFallback() {
      return fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true')
        .then(r => r.json())
        .then(data => {
          showPrice(
            Math.round(data.bitcoin.usd),
            data.bitcoin.usd_24h_change
          );
        });
    }

    function fetchBitcoinValue() {
      fetchBinance().catch(() => fetchFallback().catch(() => {
        bitcoinValueElement.textContent = 'Error';
      }));
    }

    fetchBitcoinValue();
    setInterval(fetchBitcoinValue, 10000);

    // ── CLOCK ──
    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('current-time').textContent = h + ':' + m;
    }
    setInterval(updateTime, 1000);
    updateTime();

    // ── CALENDAR ──
    const MONTHS = [
      'JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
      'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'
    ];

    function buildCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const todayNum = now.getDate();

      document.getElementById('cal-month').textContent = MONTHS[month] + ' ' + year;

      const firstWeekday = new Date(year, month, 1).getDay();
      const daysInMonth  = new Date(year, month + 1, 0).getDate();
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';

      for (var i = 0; i < firstWeekday; i++) {
        const empty = document.createElement('span');
        empty.className = 'cal-day';
        grid.appendChild(empty);
      }
      for (var d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('span');
        cell.className = 'cal-day' + (d === todayNum ? ' today' : '');
        cell.textContent = d;
        grid.appendChild(cell);
      }
    }

    buildCalendar();
  </script>

</body>
