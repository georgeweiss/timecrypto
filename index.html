html, body {
  width: 100%;
  height: 100%;
  background: #000 !important;
  font-family: 'Orbitron', sans-serif;
  overflow: hidden;
}

body {
  display: flex !important;
  flex-direction: column !important;
  align-items: center !important;
  justify-content: center !important;
  gap: 16px !important;
  background: #000 !important;
}

.card {
  width: 88vw;
  max-width: 420px;
  border-radius: 18px;
  background: #000 !important;
  border: 1px solid #1f1f1f;
  position: relative;
  overflow: hidden;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 50%;
  transform: translateX(-50%);
  width: 55%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}

#card-time { padding: 20px; text-align: center; }

#current-time {
  font-size: clamp(56px, 17vw, 96px);
  font-weight: 700;
  letter-spacing: -2px;
  color: #fff;
  line-height: 1;
}

#card-cal { padding: 18px 20px 20px; }

#cal-month {
  font-size: 10px;
  letter-spacing: 0.3em;
  color: #555;
  margin-bottom: 12px;
  text-transform: uppercase;
  text-align: center;
}

#cal-dow {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  width: 100%;
  margin-bottom: 8px;
}

#cal-dow span { font-size: 9px; color: #333; text-align: center; }

#cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  width: 100%;
  row-gap: 8px;
}

.cal-day { font-size: 13px; color: #555; text-align: center; padding: 2px 0; line-height: 1; }

.cal-day.today {
  background: #fff;
  color: #000;
  font-weight: 700;
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  padding: 0;
  font-size: 13px;
}

#card-btc { padding: 20px; text-align: center; }

#bitcoin-value {
  font-size: clamp(48px, 14vw, 80px);
  font-weight: 700;
  letter-spacing: -2px;
  color: #fff;
  line-height: 1;
}

#delta { font-size: 13px; font-weight: 400; letter-spacing: 0.1em; margin-top: 8px; }
#delta.up   { color: #4caf7d; }
#delta.down { color: #c0392b; }

<body>

  <div class="card" id="card-time">
    <div id="current-time"></div>
  </div>

  <div class="card" id="card-cal">
    <div id="cal-month"></div>
    <div id="cal-dow">
      <span>SU</span><span>MO</span><span>TU</span>
      <span>WE</span><span>TH</span><span>FR</span><span>SA</span>
    </div>
    <div id="cal-grid"></div>
  </div>

  <div class="card" id="card-btc">
    <div id="bitcoin-value">--,---</div>
    <div id="delta"></div>
  </div>

  <script>
    function updateTime() {
      const now = new Date();
      const h = now.getHours().toString().padStart(2, '0');
      const m = now.getMinutes().toString().padStart(2, '0');
      document.getElementById('current-time').textContent = h + ':' + m;
    }
    setInterval(updateTime, 1000);
    updateTime();

    const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE',
                    'JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

    function buildCalendar() {
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      const todayNum = now.getDate();
      document.getElementById('cal-month').textContent = MONTHS[month] + ' ' + year;
      const firstWeekday = new Date(year, month, 1).getDay();
      const daysInMonth  = new Date(year, month + 1, 0).getDate();
      const grid = document.getElementById('cal-grid');
      grid.innerHTML = '';
      for (var i = 0; i < firstWeekday; i++) {
        const e = document.createElement('span');
        e.className = 'cal-day';
        grid.appendChild(e);
      }
      for (var d = 1; d <= daysInMonth; d++) {
        const cell = document.createElement('span');
        cell.className = 'cal-day' + (d === todayNum ? ' today' : '');
        cell.textContent = d;
        grid.appendChild(cell);
      }
    }
    buildCalendar();

    function showPrice(value, change) {
      document.getElementById('bitcoin-value').textContent = value.toLocaleString('en-US');
      const isUp = change >= 0;
      document.getElementById('delta').textContent = (isUp ? '▲ +' : '▼ ') + change.toFixed(2) + '%';
      document.getElementById('delta').className = isUp ? 'up' : 'down';
    }

    function tryFetch(attempt) {
      if (attempt === 1) {
        fetch('https://api.binance.com/api/v3/ticker/24hr?symbol=BTCUSDT')
          .then(r => r.json())
          .then(data => {
            showPrice(Math.round(parseFloat(data.lastPrice)), parseFloat(data.priceChangePercent));
          })
          .catch(() => tryFetch(2));
      } else if (attempt === 2) {
        fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd&include_24hr_change=true')
          .then(r => r.json())
          .then(data => {
            showPrice(Math.round(data.bitcoin.usd), data.bitcoin.usd_24h_change);
          })
          .catch(() => tryFetch(3));
      } else {
        fetch('https://mempool.space/api/v1/prices')
          .then(r => r.json())
          .then(data => {
            document.getElementById('bitcoin-value').textContent = Math.round(data.USD).toLocaleString('en-US');
            document.getElementById('delta').textContent = '';
          })
          .catch(() => {
            document.getElementById('bitcoin-value').textContent = '---';
          });
      }
    }

    tryFetch(1);
    setInterval(function() { tryFetch(1); }, 10000);
  </script>

</body>
</html>
